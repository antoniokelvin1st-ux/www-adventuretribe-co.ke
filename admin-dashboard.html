<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure Tribe Admin Dashboard</title>

  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#111;color:white}
    header{background:#1c1c1c;padding:18px 25px;display:flex;justify-content:space-between;align-items:center}
    h1{color:orange;margin:0}
    .container{padding:25px}
    .card{background:#2b2b2b;padding:25px;border-radius:15px;margin-bottom:25px}
    input,textarea,select{
      width:100%;
      padding:14px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      box-sizing:border-box;
      font-size:16px;
    }
    textarea{height:100px}
    button{
      background:orange;
      color:black;
      border:none;
      padding:14px 20px;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
      font-size:16px;
    }
    button:hover{opacity:.85}
    .logout{background:red;color:white}
    #status{color:lightgreen;font-weight:bold}
  </style>
</head>

<body>

<header>
  <h1>Adventure Tribe Admin</h1>
  <button class="logout" id="logoutBtn">Logout</button>
</header>

<div class="container">

  <p id="status">Checking admin access...</p>

  <div class="card">
    <h2>Update Merchandise Slot</h2>

    <select id="itemCategory">
      <option value="brandedHoodie">Branded Hoodie</option>
      <option value="balaclavaHoodie">Balaclava Hoodie</option>
      <option value="brandedTshirt">Branded T-Shirt</option>
      <option value="brandedCap">Branded Cap</option>
    </select>

    <input id="itemName" placeholder="Item name">
    <input id="itemPrice" placeholder="Price e.g. KES 4,500">
    <textarea id="itemDesc" placeholder="Description"></textarea>
    <input id="itemImage" placeholder="Image URL">

    <button id="saveMerchBtn">Save / Replace Merchandise</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_rDX_asPmDfPUKMGCptkKeOGir65s45I",
  authDomain: "adventure-tribe-41304.firebaseapp.com",
  databaseURL: "https://adventure-tribe-41304-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "adventure-tribe-41304",
  storageBucket: "adventure-tribe-41304.appspot.com",
  messagingSenderId: "107688212796",
  appId: "1:107688212796:web:7cd5491af04afe54ea0639"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "admin-login.html";
  } else {
    document.getElementById("status").innerText = "Logged in as: " + user.email;
  }
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "admin-login.html";
});

document.getElementById("saveMerchBtn").addEventListener("click", async () => {
  const category = document.getElementById("itemCategory").value;

  await set(ref(db, "merchandise/" + category), {
    name: document.getElementById("itemName").value,
    price: document.getElementById("itemPrice").value,
    description: document.getElementById("itemDesc").value,
    image: document.getElementById("itemImage").value
  });

  alert("Merchandise updated successfully!");
});
</script>

</body>
</html>
