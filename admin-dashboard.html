<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adventure Tribe Admin Dashboard</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#111;color:#fff}
    header{background:#1c1c1c;padding:18px 25px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
    h1{color:orange}
    h2{margin-bottom:15px}
    .container{padding:25px;display:grid;gap:25px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .card{background:#2b2b2b;padding:25px;border-radius:15px}
    input,textarea,select{width:100%;padding:14px;margin:8px 0;border:none;border-radius:8px;font-size:15px}
    textarea{height:90px}
    button{background:orange;color:#111;border:none;padding:12px 18px;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:8px}
    button:hover{opacity:.85}
    .logout,.delete{background:red;color:white}
    .edit{background:#00c2ff;color:#111}
    .done{background:#20c997;color:#111}
    .status{color:lightgreen;font-weight:bold;margin-bottom:10px}
    .items{display:grid;gap:12px;margin-top:18px}
    .item{background:#1b1b1b;padding:14px;border-radius:12px;display:grid;grid-template-columns:80px 1fr auto;gap:12px;align-items:center}
    .booking-item{grid-template-columns:1fr auto}
    .item img{width:80px;height:65px;object-fit:cover;border-radius:8px;background:#333}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .small{font-size:13px;color:#bbb}
    .preview{width:100%;height:180px;object-fit:cover;border-radius:12px;background:#222;margin-top:10px;display:none}
    .badge{display:inline-block;padding:5px 10px;border-radius:999px;background:orange;color:#111;font-size:12px;font-weight:bold;margin-top:6px}
    .badge.done-badge{background:#20c997}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.item{grid-template-columns:1fr}.item img{width:100%;height:180px}}
  </style>
</head>

<body>

<header>
  <h1>Adventure Tribe Admin</h1>
  <button class="logout" id="logoutBtn">Logout</button>
</header>

<div class="container">
  <p class="status" id="status">Checking admin access...</p>

  <div class="card">
    <h2>📅 Bookings Manager</h2>
    <div class="items" id="bookingsList"></div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>🏔 Add / Update Trip</h2>
      <input id="tripId" placeholder="Trip ID e.g suswa, karuraForest">
      <input id="tripName" placeholder="Trip name">
      <input id="tripPrice" placeholder="Price e.g KES 1,950">
      <input id="tripDifficulty" placeholder="Difficulty e.g Easy, Premium">
      <input id="tripInclusions" placeholder="Inclusions e.g Road Trip • Caves • Views">
      <select id="tripCategory">
        <option value="hike">Hike</option>
        <option value="camp">Camping</option>
        <option value="road">Road Trip</option>
      </select>
      <input type="file" id="tripImageFile" accept="image/*">
      <img id="tripPreview" class="preview">
      <button id="saveTripBtn">Save Trip</button>
    </div>

    <div class="card">
      <h2>👕 Add / Update Merchandise</h2>
      <input id="merchId" placeholder="Merch ID e.g brandedHoodie">
      <input id="merchName" placeholder="Item name">
      <input id="merchPrice" placeholder="Price e.g KES 3,500">
      <textarea id="merchDesc" placeholder="Description"></textarea>
      <input type="file" id="merchImageFile" accept="image/*">
      <img id="merchPreview" class="preview">
      <button id="saveMerchBtn">Save Merchandise</button>
    </div>

    <div class="card">
      <h2>🖼 Add / Update Gallery</h2>
      <input id="galleryId" placeholder="Gallery ID e.g gallery1">
      <input id="galleryTitle" placeholder="Image title">
      <input type="file" id="galleryImageFile" accept="image/*">
      <img id="galleryPreview" class="preview">
      <button id="saveGalleryBtn">Save Gallery Image</button>
    </div>
  </div>

  <div class="card">
    <h2>🏔 Trips</h2>
    <div class="items" id="tripsList"></div>
  </div>

  <div class="card">
    <h2>👕 Merchandise</h2>
    <div class="items" id="merchList"></div>
  </div>

  <div class="card">
    <h2>🖼 Gallery</h2>
    <div class="items" id="galleryList"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_rDX_asPmDfPUKMGCptkKeOGir65s45I",
  authDomain: "adventure-tribe-41304.firebaseapp.com",
  databaseURL: "https://adventure-tribe-41304-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "adventure-tribe-41304",
  storageBucket: "adventure-tribe-41304.appspot.com",
  messagingSenderId: "107688212796",
  appId: "1:107688212796:web:7cd5491af04afe54ea0639",
  measurementId: "G-6FFH6DE1J3"
};

const CLOUD_NAME = "dbyeox0j8";
const UPLOAD_PRESET = "adventure-tribe";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const statusBox = document.getElementById("status");

onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = "admin-login.html";
  else statusBox.innerText = "Logged in as: " + user.email;
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "admin-login.html";
});

function cleanId(value) {
  return String(value || "").trim().replace(/\s+/g, "-").replace(/[^a-zA-Z0-9-_]/g, "");
}

function safe(value) {
  return String(value || "").replace(/[&<>'"]/g, char => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"
  }[char]));
}

function showPreview(fileInputId, previewId) {
  const input = document.getElementById(fileInputId);
  const preview = document.getElementById(previewId);

  input.addEventListener("change", () => {
    const file = input.files[0];
    if (!file) return;
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  });
}

showPreview("tripImageFile", "tripPreview");
showPreview("merchImageFile", "merchPreview");
showPreview("galleryImageFile", "galleryPreview");

async function uploadToCloudinary(file) {
  if (!file) return "";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);
  formData.append("folder", "adventure-tribe");

  const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
    method: "POST",
    body: formData
  });

  const data = await response.json();

  if (!response.ok) {
    console.error(data);
    throw new Error(data.error?.message || "Cloudinary upload failed");
  }

  return data.secure_url;
}

document.getElementById("saveTripBtn").addEventListener("click", async () => {
  try {
    const id = cleanId(document.getElementById("tripId").value);
    if (!id) return alert("Enter Trip ID");

    const file = document.getElementById("tripImageFile").files[0];
    const image = await uploadToCloudinary(file);

    const tripData = {
      name: document.getElementById("tripName").value,
      price: document.getElementById("tripPrice").value,
      difficulty: document.getElementById("tripDifficulty").value,
      inclusions: document.getElementById("tripInclusions").value,
      category: document.getElementById("tripCategory").value
    };

    if (image) tripData.image = image;

    await update(ref(db, "trips/" + id), tripData);
    alert("Trip saved successfully!");
  } catch (error) {
    alert(error.message);
  }
});

document.getElementById("saveMerchBtn").addEventListener("click", async () => {
  try {
    const id = cleanId(document.getElementById("merchId").value);
    if (!id) return alert("Enter Merch ID");

    const file = document.getElementById("merchImageFile").files[0];
    const image = await uploadToCloudinary(file);

    const merchData = {
      name: document.getElementById("merchName").value,
      price: document.getElementById("merchPrice").value,
      description: document.getElementById("merchDesc").value
    };

    if (image) merchData.image = image;

    await update(ref(db, "merchandise/" + id), merchData);
    alert("Merchandise saved successfully!");
  } catch (error) {
    alert(error.message);
  }
});

document.getElementById("saveGalleryBtn").addEventListener("click", async () => {
  try {
    const id = cleanId(document.getElementById("galleryId").value);
    if (!id) return alert("Enter Gallery ID");

    const file = document.getElementById("galleryImageFile").files[0];
    if (!file) return alert("Choose a gallery image");

    const image = await uploadToCloudinary(file);

    await update(ref(db, "gallery/" + id), {
      title: document.getElementById("galleryTitle").value,
      image
    });

    alert("Gallery image saved successfully!");
  } catch (error) {
    alert(error.message);
  }
});

function renderList(path, containerId, type) {
  const container = document.getElementById(containerId);

  onValue(ref(db, path), (snapshot) => {
    const data = snapshot.val() || {};
    const entries = Object.entries(data);

    if (!entries.length) {
      container.innerHTML = `<p class="small">No items yet.</p>`;
      return;
    }

    container.innerHTML = entries.map(([id, item]) => `
      <div class="item">
        <img src="${safe(item.image || "adventuretribe-brand.png")}" alt="${safe(item.name || item.title || id)}">
        <div>
          <strong>${safe(item.name || item.title || id)}</strong>
          <p class="small">${safe(item.price || item.difficulty || "")}</p>
          <p class="small">${safe(item.description || item.inclusions || "")}</p>
          <p class="small">ID: ${safe(id)}</p>
        </div>
        <div class="actions">
          <button class="edit" onclick="editItem('${type}','${safe(id)}')">Edit</button>
          <button class="delete" onclick="deleteItem('${path}','${safe(id)}')">Delete</button>
        </div>
      </div>
    `).join("");
  });
}

function renderBookings() {
  const container = document.getElementById("bookingsList");

  onValue(ref(db, "bookings"), (snapshot) => {
    const data = snapshot.val() || {};
    const entries = Object.entries(data).reverse();

    if (!entries.length) {
      container.innerHTML = `<p class="small">No bookings yet.</p>`;
      return;
    }

    container.innerHTML = entries.map(([id, booking]) => `
      <div class="item booking-item">
        <div>
          <strong>${safe(booking.name)}</strong>
          <p class="small">Phone: ${safe(booking.phone)}</p>
          <p class="small">Email: ${safe(booking.email || "Not provided")}</p>
          <p class="small">Trip: ${safe(booking.trip)}</p>
          <p class="small">Date: ${safe(booking.date || "Not selected")}</p>
          <p class="small">Tickets: ${safe(booking.tickets)}</p>
          <p class="small">Payment: ${safe(booking.payment)}</p>
          <p class="small">Message: ${safe(booking.message || "")}</p>
          <p class="small">Time: ${safe(booking.createdAt || "")}</p>
          <span class="badge ${booking.status === "confirmed" ? "done-badge" : ""}">
            ${safe(booking.status || "new")}
          </span>
        </div>

        <div class="actions">
          <button class="done" onclick="confirmBooking('${safe(id)}')">Mark Confirmed</button>
          <button class="delete" onclick="deleteItem('bookings','${safe(id)}')">Delete</button>
        </div>
      </div>
    `).join("");
  });
}

window.confirmBooking = async function(id) {
  await update(ref(db, "bookings/" + id), {
    status: "confirmed"
  });
  alert("Booking marked as confirmed");
};

window.deleteItem = async function(path, id) {
  if (!confirm("Delete this item?")) return;
  await remove(ref(db, path + "/" + id));
  alert("Deleted successfully");
};

window.editItem = function(type, id) {
  if (type === "trip") {
    document.getElementById("tripId").value = id;
    alert("Trip ID loaded. Edit details and save again.");
  }

  if (type === "merch") {
    document.getElementById("merchId").value = id;
    alert("Merch ID loaded. Edit details and save again.");
  }

  if (type === "gallery") {
    document.getElementById("galleryId").value = id;
    alert("Gallery ID loaded. Edit details and save again.");
  }
};

renderBookings();
renderList("trips", "tripsList", "trip");
renderList("merchandise", "merchList", "merch");
renderList("gallery", "galleryList", "gallery");
</script>

</body>
</html>
