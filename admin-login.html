<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adventure Tribe Admin Login</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#0f0f0f;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
    }

    .login-box{
      background:#1a1a1a;
      padding:40px;
      border-radius:15px;
      width:320px;
      box-shadow:0 0 20px rgba(255,140,0,0.3);
    }

    h2{
      text-align:center;
      color:orange;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:none;
      border-radius:8px;
      background:#2b2b2b;
      color:white;
    }

    button{
      width:100%;
      padding:12px;
      background:orange;
      color:black;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    .error{
      color:red;
      text-align:center;
      margin-top:10px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Adventure Tribe Admin</h2>

  <input type="email" id="email" placeholder="Admin Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">LOGIN</button>

  <div class="error" id="error"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_rDX_asPmDfPUKMGCptkkEeOGir65s45I",
  authDomain: "adventure-tribe-41304.firebaseapp.com",
  projectId: "adventure-tribe-41304",
  storageBucket: "adventure-tribe-41304.firebasestorage.app",
  messagingSenderId: "107688212796",
  appId: "1:107688212796:web:7cd5491af04afe54ea0639",
  measurementId: "G-6FFH6DE1J3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(() => {

    window.location.href = "admin-dashboard.html";

  })
  .catch((error) => {

    document.getElementById("error").innerText =
      "Invalid admin login";

  });

}

</script>

</body>
</html>
