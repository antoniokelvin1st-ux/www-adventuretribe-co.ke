<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure Tribe Admin Login</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#111;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }
    .login-box{
      width:350px;
      background:#2b2b2b;
      padding:35px;
      border-radius:16px;
      box-shadow:0 0 25px rgba(255,140,0,.7);
      text-align:center;
    }
    h2{color:orange;margin-bottom:25px}
    input{
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border:none;
      border-radius:8px;
      box-sizing:border-box;
    }
    button{
      width:100%;
      padding:14px;
      background:orange;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }
    #error{color:red;margin-top:15px;font-weight:bold}
  </style>
</head>

<body>

<div class="login-box">
  <h2>Adventure Tribe Admin</h2>
  <input type="email" id="email" placeholder="Admin email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">LOGIN</button>
  <div id="error"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_rDX_asPmDfPUKMGCptkKeOGir65s45I",
  authDomain: "adventure-tribe-41304.firebaseapp.com",
  databaseURL: "https://adventure-tribe-41304-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "adventure-tribe-41304",
  storageBucket: "adventure-tribe-41304.appspot.com",
  messagingSenderId: "107688212796",
  appId: "1:107688212796:web:7cd5491af04afe54ea0639",
  measurementId: "G-6FFH6DE1J3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("error");

  errorBox.innerText = "";

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "admin-dashboard.html";
  } catch (error) {
    errorBox.innerText = error.message;
  }
});
</script>

</body>
</html>
